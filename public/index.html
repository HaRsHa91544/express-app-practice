<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        :root {
            --black: black;
            --grey: grey;
            --red: rgb(180, 0, 0);
            --yellow: rgb(255, 255, 50);
            --white: white;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html {
            scrollbar-width: thin;
            scroll-behavior: smooth;
            scrollbar-color: var(--yellow) var(--black);
        }

        body {
            background-color: var(--yellow);
        }

        main {
            padding: clamp(1.5rem, 2vw, 2rem);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(3rem, 4vw, 4rem);
        }

        .todolist-heading {
            font-size: clamp(2.5rem, 8vw, 6rem);
            text-align: center;
            font-weight: 1000;
            font-style: italic;
        }

        .todolist-input-section {
            display: flex;
            flex-flow: row wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(1rem, 2vw, 2rem);
        }

        .todolist-input {
            padding: clamp(0.75rem, 2vw, 1rem);
            background-color: rgb(250, 250, 250);
            color: var(--black);
            transition: all 0.3s ease-in-out;
            border: 2px solid var(--grey);
            outline: none;
            font-size: clamp(0.95rem, 2vw, 1rem);
        }

        .todolist-input:focus {
            box-shadow: 0px 0px 3px gray;
            border: 2px solid var(--black);
        }

        .add-task-btn,
        .delete-task-btn {
            padding: clamp(0.75rem, 2vw, 1rem) 2rem;
            font-size: clamp(0.95rem, 2vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }

        .add-task-btn {
            background-color: var(--black);
            color: var(--white);
            border: 2px solid var(--black);
        }

        .add-task-btn:hover {
            border: 2px solid var(--white);
            box-shadow: 0px 0px 3px var(--grey);
        }

        .add-task-btn:active {
            background-color: rgb(50, 50, 50);
        }

        .todolist-section {
            display: flex;
            flex-flow: column wrap;
            gap: clamp(1.5rem, 2vw, 2rem);
        }

        .todolist-no-items-heading {
            font-size: clamp(1.25rem, 2vw, 2rem);
            font-weight: 1000;
            font-style: italic;
            text-align: center;
            color: var(--red);
        }

        .task-item {
            display: flex;
            gap: clamp(2rem, 4vw, 4rem);
            align-items: center;
            justify-content: space-between;
        }

        .task-name {
            font-size: clamp(1.25rem, 2vw, 2rem);
            font-weight: 600;
        }

        .delete-task-btn {
            background-color: var(--red);
            color: var(--white);
            border: 2px solid var(--red);
        }

        .delete-task-btn:hover {
            border: 2px solid var(--white);
            box-shadow: 0px 0px 3px gray;
        }

        .delete-task-btn:active {
            background-color: rgb(150, 0, 0);
        }
    </style>
</head>

<body>
    <main>
        <h1 class="todolist-heading">Your's Todo List</h1>
        <section class="todolist-input-section">
            <input type="text" placeholder="Enter New Task" class="todolist-input">
            <button class="add-task-btn">Add Task</button>
        </section>
        <section class="todolist-section">

        </section>
    </main>
    <script>
        window.addEventListener('load', getTodos);

        const todolistSection = document.querySelector('.todolist-section');
        const addTaskBtn = document.querySelector('.add-task-btn');

        addTaskBtn.addEventListener('click', addTask);

        document.addEventListener('click', (e) => {
            const isDeleteBtnClicked = e.target.classList.contains('delete-task-btn');

            if (isDeleteBtnClicked) deleteTask(e.target.dataset.id);
        });

        function getTodos() {
            fetch(`./get-todo-list`)
                .then((res) => res.json())
                .then((resData) => renderTodos(resData.data.todos));
        }

        function renderTodos(todos) {
            let tasksHTML = '';
            if (todos.length === 0) {
                tasksHTML = "<h2 class='todolist-no-items-heading'>You don't have any Tasks!</h2>";
            }
            todos.forEach((todoItem, index) => {
                tasksHTML += `
                    <div class="task-item">
                        <h2 class="task-name">${todoItem.task}</h2>
                        <button class="delete-task-btn" data-id=${todoItem.id}>Delete</button>
                    </div>
                `;
            });

            todolistSection.innerHTML = tasksHTML;
        }


        function addTask() {
            const todoInput = document.querySelector('.todolist-input');

            const id = parseInt(Math.random() * 100000);

            const task = todoInput.value;

            fetch(`./add-task`, {
                method: 'POST',
                headers: {
                    'Content-type': 'application/json'
                },
                body: JSON.stringify({ id, task })
            })
                .then(handleResponse)
                .then(getTodos);

            todoInput.value = '';
        }

        function deleteTask(id) {
            fetch(`./delete-task?id=${id}`, {
                method: 'DELETE',
                headers: {
                    'Content-type': 'application/json'
                }
            })
                .then(handleResponse)
                .then(getTodos);
        }

        function handleResponse(res) {
            if (!res.ok) {
                res.json().then(showErrorMessage);
            }
        }

        function showErrorMessage(error) {
            alert(error.message);
        }
    </script>
</body>

</html>
